[tool.poetry]
name = "opus-mt-ja-en"
version = "1.0.0"
description = "Automatically generated by Nx."
authors = [ ]
license = 'Proprietary'
readme = 'README.md'

  [[tool.poetry.packages]]
  include = "opus_mt_ja_en"

  [tool.poetry.dependencies]
  python = "==3.12.7"
  certifi = "2025.1.31"
  charset-normalizer = "3.4.1"
  click = "8.1.8"
  filelock = "3.18.0"
  fsspec = "2025.3.2"
  huggingface-hub = "0.30.1"
  idna = "3.10"
  joblib = "1.4.2"
  numpy = "2.2.4"
  packaging = "24.2"
  protobuf = "6.30.2"
  pyyaml = "6.0.2"
  regex = "2024.11.6"
  requests = "2.32.3"
  sacremoses = "0.1.1"
  safetensors = "0.5.3"
  sentencepiece = "0.2.0"
  tokenizers = "0.21.1"
  tqdm = "4.67.1"
  transformers = "4.50.3"
  typing-extensions = "4.13.0"
  urllib3 = "2.3.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.ruff]
exclude = [
  ".ruff_cache",
  ".svn",
  ".tox",
  ".venv",
  "dist",
]

line-length = 130
indent-width = 4

[tool.ruff.lint]
select = [
  # pycodestyle
  "E",
  # Pyflakes
  "F",
  # pyupgrade
  "UP",
  # flake8-bugbear
  "B",
  # flake8-simplify
  "SIM",
  # isort
  "I",
]
ignore = []

fixable = ["ALL"]
unfixable = []
