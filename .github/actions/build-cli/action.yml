name: Build CLI Tooling
description: This action builds the CLI tooling for the project.
inputs:
  os:
    description: "The operating system to build for."
    required: true
  # arch:
  #   description: "The architecture to build for."
  #   required: true
  shell:
    description: "The shell to use for running commands."
    required: true
    default: "bash"
  version:
    description: "The version of the project to build."
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12.7"
    - name: Run image
      uses: abatilo/actions-poetry@v3
      with:
        poetry-version: "main"
    - name: Add poetry to PATH
      shell: ${{ inputs.shell }}
      run: |
        echo "$HOME/.local/bin" >> $GITHUB_PATH
    - name: Install gd-sudachi dependencies
      shell: ${{ inputs.shell }}
      run: nx run gd-sudachi:install
    - name: Install opus-mt-ja-en dependencies
      shell: ${{ inputs.shell }}
      run: nx run opus-mt-ja-en:install    
    - name: Build opus-mt-ja-en
      shell: ${{ inputs.shell }}
      run: nx run opus-mt-ja-en:build
    - name: Build sudachi
      shell: ${{ inputs.shell }}
      run: |
        nx run gd-sudachi:build:${{ inputs.os }} --version=${{ inputs.version }}
    - name: Build gd-tools
      shell: ${{ inputs.shell }}
      run: |
        nx run gd-tools:build:${{ inputs.os }}
    - name: Build subs2clipboard-native-messenger
      shell: ${{ inputs.shell }}
      run: |
        nx run subs2clipboard-native-messenger:build:${{ inputs.os }}
