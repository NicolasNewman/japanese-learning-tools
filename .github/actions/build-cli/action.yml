inputs:
  os:
    description: "The operating system to build for."
    required: true
  # arch:
  #   description: "The architecture to build for."
  #   required: true
  shell:
    description: "The shell to use for running commands."
    required: true
    default: "bash"

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Run image
      uses: abatilo/actions-poetry@v3
      with:
        poetry-version: "main"
    - name: Add poetry to PATH
      shell: ${{ inputs.shell }}
      run: |
        echo "$HOME/.local/bin" >> $GITHUB_PATH
    - name: Install the project dependencies
      shell: ${{ inputs.shell }}
      run: nx run gd-sudachi:install
    - name: Build sudachi
      shell: ${{ inputs.shell }}
      run: |
        nx run gd-sudachi:build:${{ inputs.os }}
