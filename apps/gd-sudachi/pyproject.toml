[tool.poetry]
name = "gd-sudachi"
version = "0.3.2"
description = "Automatically generated by Nx."
authors = []
license = 'Proprietary'
readme = 'README.md'

[tool.coverage.run]
branch = true
source = ["gd-sudachi"]

[tool.coverage.report]
exclude_lines = ['if TYPE_CHECKING:']
show_missing = true

[tool.pytest.ini_options]
addopts = """
 --cov
 --cov-report html:'../../coverage/gd-sudachi/html'
 --cov-report xml:'../../coverage/gd-sudachi/coverage.xml'
 --html='../../reports/gd-sudachi/unittests/html/index.html'
 --junitxml='../../reports/gd-sudachi/unittests/junit.xml'
"""


[[tool.poetry.packages]]
include = "gd_sudachi"

[tool.poetry.dependencies]
python = ">=3.9"
sudachipy = "^0.6.10"
sudachidict-core = "^20250515"
selectolax = "^0.3.30"

[tool.poetry.scripts]
gd-sudachi = "gd_sudachi:main"

[tool.poetry.group.dev.dependencies]
nuitka = "^2.7.7"
pytest = "^8.4.1"
autopep8 = "2.3.1"
ruff = "0.8.2"
pytest-sugar = "1.0.0"
pytest-cov = "6.0.0"
pytest-html = "4.1.1"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.ruff]
exclude = [".ruff_cache", ".svn", ".tox", ".venv", "dist"]

line-length = 88
indent-width = 4

[tool.ruff.lint]
select = [
  # pycodestyle
  "E",
  # Pyflakes
  "F",
  # pyupgrade
  "UP",
  # flake8-bugbear
  "B",
  # flake8-simplify
  "SIM",
  # isort
  "I",
]
ignore = []

fixable = ["ALL"]
unfixable = []
